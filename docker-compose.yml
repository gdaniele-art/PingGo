services:
  postgres:
    image: postgres:16-alpine
    container_name: pinggo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pinggo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pinggo_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-pinggo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pinggo} -d ${POSTGRES_DB:-pinggo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pinggo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pinggo}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pinggo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pinggo_dev_password}


      ALERTS_ENABLED: ${ALERTS_ENABLED:-false}
      ALERTS_MAIL_ENABLED: ${ALERTS_MAIL_ENABLED:-false}
      ALERTS_MAIL_TO: ${ALERTS_MAIL_TO:-}
      ALERTS_MAIL_FROM: ${ALERTS_MAIL_FROM:-}

      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}

      ALERTS_SLACK_ENABLED: ${ALERTS_SLACK_ENABLED:-false}
      ALERTS_SLACK_WEBHOOK_URL: ${ALERTS_SLACK_WEBHOOK_URL:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pinggo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"


volumes:
  postgres-data:

